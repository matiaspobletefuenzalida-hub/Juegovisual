<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Pentagrama - Misión Clave de Sol</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Colores inspirados en Mario y Super Ritmo */
            --bg-color: #fff9c4; 
            --surface: #ffffff;
            --text-main: #2c3e50;
            --primary: #2c3e50;
            --accent: #049CD8;   /* Azul Mario */
            --accent-hover: #0082c3;
            --success: #43B047; /* Verde Mario */
            --error: #E52521;   /* Rojo Mario */
            --staff-lines: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#fff176 15%, transparent 15%);
            background-size: 30px 30px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 0px #fbc02d, 0 25px 40px rgba(0,0,0,0.1);
            border: 5px solid #fff;
            border-bottom: 12px solid #ffb300;
            border-bottom-right-radius: 60px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            position: relative;
        }

        /* --- TÍTULO ESTILO SUPER MARIO --- */
        h1.mario-title { 
            font-family: 'Fredoka', sans-serif; 
            font-weight: 900; 
            font-size: 4.2rem; 
            margin-bottom: 0.5rem; 
            letter-spacing: 2px;
            line-height: 1.1;
            text-shadow: 
                -4px -4px 0 #000,  
                 4px -4px 0 #000,
                -4px  4px 0 #000,
                 4px  4px 0 #000,
                 0px  6px 0 #000,
                 0px 15px 10px rgba(0,0,0,0.3);
        }

        .mario-title span { display: inline-block; }
        .mario-title span:nth-child(even) { transform: rotate(3deg) translateY(-3px); }
        .mario-title span:nth-child(odd) { transform: rotate(-3deg) translateY(3px); }

        .m-red { color: #E52521; }
        .m-blue { color: #049CD8; }
        .m-yellow { color: #FBD000; }
        .m-green { color: #43B047; }

        p.subtitle { 
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            color: #546e7a; 
            margin-top: 10px;
            margin-bottom: 2.5rem; 
            font-size: 1.3rem; 
        }

        /* --- MOTOR GRÁFICO DEL PENTAGRAMA --- */
        .staff-container {
            position: relative;
            width: 100%;
            height: 200px;
            background: transparent;
            margin: 0 auto 3rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            /* ¡Borde y sombra eliminados para evitar confusiones! */
        }

        .staff-lines {
            position: relative;
            width: 80%;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .line {
            width: 100%;
            height: 3px; 
            background-color: var(--staff-lines);
            position: relative;
            z-index: 1;
        }

        .clef {
            position: absolute;
            font-family: 'Noto Music', sans-serif;
            font-size: 140px;
            left: 10px;
            top: 50%;
            transform: translateY(-53%); 
            color: var(--staff-lines);
            z-index: 2;
            user-select: none;
        }

        .note {
            position: absolute;
            left: 220px;
            width: 26px; 
            height: 20px;
            background-color: #000;
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            z-index: 3;
            transition: top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid #000; 
        }

        .ledger-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(15deg);
            width: 44px;
            height: 3px;
            background-color: var(--staff-lines);
            display: none;
            z-index: -1;
        }

        /* --- UI DE CONTROLES --- */
        .controls {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-bottom: 2rem;
            padding: 0 10px;
        }

        @media (max-width: 600px) {
            .controls { grid-template-columns: repeat(4, 1fr); }
            .note { left: 160px; }
            .staff-lines { width: 95%; }
            h1.mario-title { font-size: 3rem; }
        }

        .btn-note {
            font-family: 'Fredoka', sans-serif;
            padding: 18px 10px;
            font-size: 1.4rem;
            font-weight: 700;
            background-color: var(--accent); 
            color: white;
            border: 3px solid #000; 
            border-radius: 50px; 
            cursor: pointer;
            position: relative;
            top: 0;
            transition: all 0.1s;
            text-shadow: 1px 1px 0 #000;
            box-shadow: 0 6px 0px #000;
        }

        .btn-note:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        .btn-note:active:not(:disabled) { 
            top: 6px;
            box-shadow: 0 0px 0px #000;
        }

        .btn-note:disabled { cursor: not-allowed; opacity: 0.8; }
        
        .btn-note.correct {
            background-color: var(--success);
            border-color: #000;
            color: white;
        }

        .btn-note.incorrect {
            background-color: var(--error);
            border-color: #000;
            color: white;
            animation: shake 0.4s;
        }

        /* --- FEEDBACK Y PUNTAJE --- */
        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 1rem;
        }

        #score, #streak {
            color: var(--accent);
        }

        .feedback-msg {
            height: 35px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 1rem;
            transition: opacity 0.3s;
            opacity: 0;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
        }

        .msg-success { color: var(--success); }
        .msg-error { color: var(--error); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        .credito-profesor {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: #546e7a;
            padding-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1 class="mario-title">
        <span class="m-red">S</span><span class="m-blue">U</span><span class="m-yellow">P</span><span class="m-green">E</span><span class="m-red">R</span><br>
        <span class="m-green">P</span><span class="m-blue">E</span><span class="m-yellow">N</span><span class="m-red">T</span><span class="m-green">A</span><span class="m-blue">G</span><span class="m-red">R</span><span class="m-yellow">A</span><span class="m-green">M</span><span class="m-blue">A</span>
    </h1>
    <p class="subtitle">🍄 ¡Misión: Identifica la nota en Clave de Sol! ⭐</p>

    <div class="staff-container">
        <div class="staff-lines" id="staff">
            <div class="clef">&#x1D11E;</div>
            
            <div class="line"></div> <div class="line"></div> <div class="line"></div> <div class="line"></div> <div class="line"></div> <div class="note" id="active-note">
                <div class="ledger-line" id="ledger-line"></div>
            </div>
        </div>
    </div>

    <div class="feedback-msg" id="feedback">¡Bien hecho!</div>

    <div class="controls" id="btn-container"></div>

    <div class="stats">
        <div>💰 Puntuación: <span id="score">0</span></div>
        <div>🔥 Racha: <span id="streak">0</span></div>
    </div>

    <div class="credito-profesor">
        Creado por Profesor Matías Poblete
    </div>
</div>

<script>
    const MUSIC_DATA = [
        { name: 'DO', top: 150, needsLedger: true },  
        { name: 'RE', top: 135, needsLedger: false }, 
        { name: 'MI', top: 120, needsLedger: false }, 
        { name: 'FA', top: 105, needsLedger: false }, 
        { name: 'SOL', top: 90, needsLedger: false }, 
        { name: 'LA', top: 75, needsLedger: false },  
        { name: 'SI', top: 60, needsLedger: false },  
        { name: 'DO', top: 45, needsLedger: false },  
        { name: 'RE', top: 30, needsLedger: false },  
        { name: 'MI', top: 15, needsLedger: false },  
        { name: 'FA', top: 0, needsLedger: false },   
        { name: 'SOL', top: -15, needsLedger: false } 
    ];

    const UI = {
        noteEl: document.getElementById('active-note'),
        ledgerEl: document.getElementById('ledger-line'),
        btnContainer: document.getElementById('btn-container'),
        feedback: document.getElementById('feedback'),
        score: document.getElementById('score'),
        streak: document.getElementById('streak')
    };

    let state = {
        currentNote: null,
        score: 0,
        streak: 0,
        isLocked: false 
    };

    function initGame() {
        const notasUnicas = ['DO', 'RE', 'MI', 'FA', 'SOL', 'LA', 'SI'];
        
        notasUnicas.forEach(nota => {
            const btn = document.createElement('button');
            btn.className = 'btn-note';
            btn.textContent = nota;
            btn.dataset.note = nota;
            btn.onclick = () => handleGuess(nota, btn);
            UI.btnContainer.appendChild(btn);
        });

        generateNextNote();
    }

    function generateNextNote() {
        let nextNote;
        do {
            nextNote = MUSIC_DATA[Math.floor(Math.random() * MUSIC_DATA.length)];
        } while (state.currentNote && nextNote.top === state.currentNote.top);

        state.currentNote = nextNote;

        UI.noteEl.style.top = `${nextNote.top}px`;
        
        UI.ledgerEl.style.display = nextNote.needsLedger ? 'block' : 'none';
        
        state.isLocked = false;
        resetButtons();
    }

    function handleGuess(guessName, btnElement) {
        if (state.isLocked) return;
        state.isLocked = true; 

        const isCorrect = (guessName === state.currentNote.name);

        if (isCorrect) {
            state.score += 10;
            state.streak += 1;
            btnElement.classList.add('correct');
            showFeedback(true);
        } else {
            state.streak = 0;
            btnElement.classList.add('incorrect');
            
            const correctBtn = document.querySelector(`button[data-note="${state.currentNote.name}"]`);
            if (correctBtn) correctBtn.classList.add('correct');
            
            showFeedback(false);
        }

        UI.score.textContent = state.score;
        UI.streak.textContent = state.streak;

        setTimeout(() => {
            UI.feedback.style.opacity = '0';
            generateNextNote();
        }, 1500);
    }

    function showFeedback(isSuccess) {
        const msgsSuccess = ["¡Perfecto! ✨", "¡Exacto! ⭐", "¡Muy bien! 🍄", "¡Excelente oído! 🔥"];
        const msgsError = [`¡Casi! Era ${state.currentNote.name} 😢`, `Revisa bien, era ${state.currentNote.name} 🧐`, `¡Atento! Esa nota es ${state.currentNote.name} 🍄`];
        
        const arr = isSuccess ? msgsSuccess : msgsError;
        UI.feedback.textContent = arr[Math.floor(Math.random() * arr.length)];
        
        UI.feedback.className = 'feedback-msg ' + (isSuccess ? 'msg-success' : 'msg-error');
        UI.feedback.style.opacity = '1';
    }

    function resetButtons() {
        const btns = document.querySelectorAll('.btn-note');
        btns.forEach(btn => {
            btn.classList.remove('correct', 'incorrect');
        });
    }

    initGame();

</script>
</body>
</html>
