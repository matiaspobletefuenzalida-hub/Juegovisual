<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro del Pentagrama | Edición Definitiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f4f4f9;
            --surface: #ffffff;
            --primary: #2c3e50;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --staff-lines: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        h1 { font-weight: 800; font-size: 2.2rem; margin-bottom: 0.5rem; }
        p.subtitle { color: #64748b; margin-bottom: 2.5rem; font-size: 1.1rem; }

        /* --- MOTOR GRÁFICO DEL PENTAGRAMA (CSS/DOM) --- */
        .staff-container {
            position: relative;
            width: 100%;
            height: 200px;
            background: #fff;
            margin: 0 auto 3rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staff-lines {
            position: relative;
            width: 80%;
            height: 120px; /* 4 espacios de 30px = 120px */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .line {
            width: 100%;
            height: 2px;
            background-color: var(--staff-lines);
            position: relative;
            z-index: 1;
        }

        /* Clave de Sol tipográficamente perfecta */
        .clef {
            position: absolute;
            font-family: 'Noto Music', sans-serif;
            font-size: 140px;
            left: 10px;
            top: 50%;
            transform: translateY(-53%); /* Ajuste fino para centrar la espiral en la línea de SOL */
            color: var(--staff-lines);
            z-index: 2;
            user-select: none;
        }

        /* La Nota Musical */
        .note {
            position: absolute;
            left: 200px; /* Posición X fija */
            width: 24px;
            height: 18px;
            background-color: #000;
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            z-index: 3;
            transition: top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); /* Animación de rebote suave */
        }

        /* Línea adicional (Ledger line) dinámica */
        .ledger-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(15deg); /* Modificado para anular los -15deg del padre */
            width: 40px;
            height: 2px;
            background-color: var(--staff-lines);
            display: none; /* Se activa vía JS */
            z-index: -1;
        }

        /* --- UI DE CONTROLES --- */
        .controls {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 2rem;
        }

        @media (max-width: 600px) {
            .controls { grid-template-columns: repeat(4, 1fr); }
            .note { left: 150px; }
            .staff-lines { width: 95%; }
        }

        .btn-note {
            padding: 15px 10px;
            font-size: 1.2rem;
            font-weight: 600;
            background: transparent;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-note:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
            background: #f0f9ff;
        }

        .btn-note:disabled { cursor: not-allowed; opacity: 0.8; }
        
        /* Estados de respuesta */
        .btn-note.correct {
            background-color: var(--success);
            border-color: var(--success);
            color: white;
            transform: scale(1.05);
        }

        .btn-note.incorrect {
            background-color: var(--error);
            border-color: var(--error);
            color: white;
            animation: shake 0.4s;
        }

        /* --- FEEDBACK Y PUNTAJE --- */
        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary);
        }

        .feedback-msg {
            height: 30px;
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            transition: opacity 0.3s;
            opacity: 0;
        }

        .msg-success { color: var(--success); }
        .msg-error { color: var(--error); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Entrenamiento Auditivo</h1>
    <p class="subtitle">Identifica la nota en Clave de Sol</p>

    <div class="staff-container">
        <div class="staff-lines" id="staff">
            <div class="clef">&#x1D11E;</div>
            
            <div class="line"></div> <div class="line"></div> <div class="line"></div> <div class="line"></div> <div class="line"></div> <div class="note" id="active-note">
                <div class="ledger-line" id="ledger-line"></div>
            </div>
        </div>
    </div>

    <div class="feedback-msg" id="feedback">¡Bien hecho!</div>

    <div class="controls" id="btn-container"></div>

    <div class="stats">
        <div>Puntuación: <span id="score">0</span></div>
        <div>Racha: <span id="streak">0</span></div>
    </div>
</div>

<script>
    /**
     * LÓGICA INFALIBLE: Mapeo exacto de la nota a su posición en píxeles.
     * El contenedor "staff-lines" tiene 120px de alto.
     * Línea superior = 0px | Línea inferior = 120px.
     * Cada paso (línea a espacio) son 15px.
     */
    const MUSIC_DATA = [
        { name: 'DO', top: 150, needsLedger: true },  // Do4 (Central, línea adicional abajo)
        { name: 'RE', top: 135, needsLedger: false }, // Re4 (Debajo de la primera línea)
        { name: 'MI', top: 120, needsLedger: false }, // Mi4 (1ra línea)
        { name: 'FA', top: 105, needsLedger: false }, // Fa4 (1er espacio)
        { name: 'SOL', top: 90, needsLedger: false }, // Sol4 (2da línea - Cruza la clave)
        { name: 'LA', top: 75, needsLedger: false },  // La4 (2do espacio)
        { name: 'SI', top: 60, needsLedger: false },  // Si4 (3ra línea)
        { name: 'DO', top: 45, needsLedger: false },  // Do5 (3er espacio)
        { name: 'RE', top: 30, needsLedger: false },  // Re5 (4ta línea)
        { name: 'MI', top: 15, needsLedger: false },  // Mi5 (4to espacio)
        { name: 'FA', top: 0, needsLedger: false },   // Fa5 (5ta línea)
        { name: 'SOL', top: -15, needsLedger: false } // Sol5 (Arriba de la 5ta línea)
    ];

    const UI = {
        noteEl: document.getElementById('active-note'),
        ledgerEl: document.getElementById('ledger-line'),
        btnContainer: document.getElementById('btn-container'),
        feedback: document.getElementById('feedback'),
        score: document.getElementById('score'),
        streak: document.getElementById('streak')
    };

    let state = {
        currentNote: null,
        score: 0,
        streak: 0,
        isLocked: false // Evita múltiples clics mientras se evalúa
    };

    function initGame() {
        const notasUnicas = ['DO', 'RE', 'MI', 'FA', 'SOL', 'LA', 'SI'];
        
        notasUnicas.forEach(nota => {
            const btn = document.createElement('button');
            btn.className = 'btn-note';
            btn.textContent = nota;
            btn.dataset.note = nota;
            btn.onclick = () => handleGuess(nota, btn);
            UI.btnContainer.appendChild(btn);
        });

        generateNextNote();
    }

    function generateNextNote() {
        // Elegir nota aleatoria que no sea igual a la anterior
        let nextNote;
        do {
            nextNote = MUSIC_DATA[Math.floor(Math.random() * MUSIC_DATA.length)];
        } while (state.currentNote && nextNote.top === state.currentNote.top);

        state.currentNote = nextNote;

        // Animar la nota a su nueva posición
        UI.noteEl.style.top = `${nextNote.top}px`;
        
        // Mostrar u ocultar la línea adicional
        UI.ledgerEl.style.display = nextNote.needsLedger ? 'block' : 'none';
        
        state.isLocked = false;
        resetButtons();
    }

    function handleGuess(guessName, btnElement) {
        if (state.isLocked) return;
        state.isLocked = true; // Bloquea el input

        const isCorrect = (guessName === state.currentNote.name);

        if (isCorrect) {
            state.score += 10;
            state.streak += 1;
            btnElement.classList.add('correct');
            showFeedback(true);
        } else {
            state.streak = 0;
            btnElement.classList.add('incorrect');
            
            // Highlight visual del botón correcto para aprendizaje
            const correctBtn = document.querySelector(`button[data-note="${state.currentNote.name}"]`);
            if (correctBtn) correctBtn.classList.add('correct');
            
            showFeedback(false);
        }

        UI.score.textContent = state.score;
        UI.streak.textContent = state.streak;

        // Esperar 1.5 segundos antes de pasar a la siguiente nota
        setTimeout(() => {
            UI.feedback.style.opacity = '0';
            generateNextNote();
        }, 1500);
    }

    function showFeedback(isSuccess) {
        const msgsSuccess = ["¡Perfecto!", "¡Exacto!", "¡Muy bien!", "¡Excelente oído!"];
        const msgsError = [`¡Casi! Era ${state.currentNote.name}`, `Revisa bien, era ${state.currentNote.name}`, `¡Atento! Esa nota es ${state.currentNote.name}`];
        
        const arr = isSuccess ? msgsSuccess : msgsError;
        UI.feedback.textContent = arr[Math.floor(Math.random() * arr.length)];
        
        UI.feedback.className = 'feedback-msg ' + (isSuccess ? 'msg-success' : 'msg-error');
        UI.feedback.style.opacity = '1';
    }

    function resetButtons() {
        const btns = document.querySelectorAll('.btn-note');
        btns.forEach(btn => {
            btn.classList.remove('correct', 'incorrect');
        });
    }

    // Iniciar la aplicación
    initGame();

</script>
</body>
</html>
