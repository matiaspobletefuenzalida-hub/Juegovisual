<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Pentagrama - Misión Clave de Sol</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fff9c4; 
            --surface: #ffffff;
            --text-main: #2c3e50;
            --primary: #2c3e50;
            --accent: #049CD8;   /* Azul Mario */
            --accent-hover: #0082c3;
            --success: #43B047;  /* Verde Mario */
            --error: #E52521;    /* Rojo Mario */
            --guide: #FF9800;    /* Naranja Guía */
            --staff-lines: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#fff176 15%, transparent 15%);
            background-size: 30px 30px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 0px #fbc02d, 0 25px 40px rgba(0,0,0,0.1);
            border: 5px solid #fff;
            border-bottom: 12px solid #ffb300;
            border-bottom-right-radius: 60px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            position: relative;
        }

        h1.mario-title { 
            font-family: 'Fredoka', sans-serif; 
            font-weight: 900; 
            font-size: 4.2rem; 
            margin-bottom: 0.5rem; 
            letter-spacing: 2px;
            line-height: 1.1;
            text-shadow: 
                -4px -4px 0 #000,  
                 4px -4px 0 #000,
                -4px  4px 0 #000,
                 4px  4px 0 #000,
                 0px  6px 0 #000,
                 0px 15px 10px rgba(0,0,0,0.3);
        }

        .mario-title span { display: inline-block; }
        .mario-title span:nth-child(even) { transform: rotate(3deg) translateY(-3px); }
        .mario-title span:nth-child(odd) { transform: rotate(-3deg) translateY(3px); }

        .m-red { color: #E52521; }
        .m-blue { color: #049CD8; }
        .m-yellow { color: #FBD000; }
        .m-green { color: #43B047; }

        p.subtitle { 
            font-weight: 900;
            color: #546e7a; 
            margin-top: 10px;
            margin-bottom: 2.5rem; 
            font-size: 1.3rem; 
        }

        .start-screen {
            background: #f8f9fa;
            border: 4px dashed #049CD8;
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .start-screen input {
            font-family: 'Nunito', sans-serif;
            font-size: 1.2rem;
            padding: 10px 15px;
            width: 80%;
            max-width: 300px;
            border: 3px solid #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
        }

        .btn-start {
            font-family: 'Fredoka', sans-serif;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: 700;
            background-color: var(--success); 
            color: white;
            border: 3px solid #000; 
            border-radius: 50px; 
            cursor: pointer;
            position: relative;
            top: 0;
            transition: all 0.1s;
            text-shadow: 1px 1px 0 #000;
            box-shadow: 0 6px 0px #000;
        }

        .btn-start:active:not(:disabled) { top: 6px; box-shadow: 0 0px 0px #000; }

        .staff-container {
            position: relative;
            width: 100%;
            height: 200px;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staff-lines {
            position: relative;
            width: 80%;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .line { width: 100%; height: 3px; background-color: var(--staff-lines); z-index: 1; }

        .clef {
            position: absolute;
            font-family: 'Noto Music', sans-serif;
            font-size: 110px;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
        }

        .note {
            position: absolute;
            left: 220px;
            width: 28px; height: 22px;
            background-color: #000;
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            z-index: 3;
            transition: top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .ledger-line {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 44px; height: 3px;
            background-color: var(--staff-lines);
            display: none;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .btn-note {
            font-family: 'Fredoka', sans-serif;
            padding: 15px 5px;
            font-size: 1.2rem;
            background-color: var(--accent);
            color: white;
            border: 3px solid #000;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
        }

        .btn-note.correct { background-color: var(--success); }
        .btn-note.incorrect { background-color: var(--error); }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center; align-items: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            max-width: 500px;
            text-align: center;
        }

        .feedback-msg { height: 40px; font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; opacity: 0; transition: 0.3s; }
        .msg-success { color: var(--success); }
        .msg-error { color: var(--error); }

        .mg-btn { padding: 10px 20px; margin: 5px; font-size: 1rem; cursor: pointer; border-radius: 10px; border: 2px solid #000; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 class="mario-title">
        <span class="m-red">S</span><span class="m-blue">U</span><span class="m-yellow">P</span><span class="m-green">E</span><span class="m-red">R</span><br>
        <span class="m-green">P</span><span class="m-blue">E</span><span class="m-yellow">N</span><span class="m-red">T</span><span class="m-green">A</span><span class="m-blue">G</span><span class="m-red">R</span><span class="m-yellow">A</span><span class="m-green">M</span><span class="m-blue">A</span>
    </h1>
    <p class="subtitle">🍄 ¡Misión: Identifica la nota en Clave de Sol! ⭐</p>

    <div id="start-screen" class="start-screen">
        <h2>Ingresa tu nombre para jugar</h2>
        <input type="text" id="player-name" placeholder="Nombre y Apellido..." required>
        <br>
        <button id="btn-start" class="btn-start">▶ JUGAR ◀</button>
    </div>

    <div id="game-area" style="display: none;">
        <div class="staff-container">
            <div class="staff-lines">
                <div class="clef"></div>
                <div class="clef" style="font-family: 'Noto Music';">𝄞</div>
                <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
                <div class="note" id="active-note">
                    <div class="ledger-line" id="ledger-line"></div>
                </div>
            </div>
        </div>

        <div class="feedback-msg" id="feedback"></div>

        <div class="controls" id="btn-container"></div>
        
        <div class="stats">
            <div>💰 Puntos: <span id="score">0</span> | 🔥 Racha: <span id="streak">0</span></div>
            <div style="font-size: 0.9rem; color: #666; margin-top: 5px;">Aciertos para sorpresa: <span id="correct-count">0</span>/20</div>
        </div>
    </div>

    <div style="margin-top: 20px; font-weight: bold; color: #777;">Creado por Profesor Matías Poblete</div>
</div>

<div id="minigame-modal" class="modal-overlay">
    <div class="modal-content" id="mg-container"></div>
</div>

<script>
    const GMAIL_URL = "https://formsubmit.co/ajax/matiaspobletefuenzalida@gmail.com";
    
    const startScreen = document.getElementById('start-screen');
    const gameArea = document.getElementById('game-area');
    const btnStart = document.getElementById('btn-start');
    const playerNameInput = document.getElementById('player-name');

    // --- LOGICA ENVÍO DE DATOS ---
    btnStart.addEventListener('click', () => {
        const playerName = playerNameInput.value.trim();
        if (!playerName) { alert("Escribe tu nombre"); return; }

        btnStart.textContent = "Cargando...";
        btnStart.disabled = true;

        fetch(GMAIL_URL, {
            method: "POST",
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({
                Estudiante: playerName,
                Evento: "Inicio de Juego",
                _subject: `🎮 Nuevo Jugador: ${playerName}`
            })
        })
        .finally(() => {
            // Siempre iniciamos el juego aunque el correo falle (para no trabar la clase)
            startScreen.style.display = 'none';
            gameArea.style.display = 'block';
            initGame();
        });
    });

    // --- LÓGICA DEL JUEGO ---
    const MUSIC_DATA = [
        { name: 'DO', top: 150, needsLedger: true }, { name: 'RE', top: 135, needsLedger: false },
        { name: 'MI', top: 120, needsLedger: false }, { name: 'FA', top: 105, needsLedger: false },
        { name: 'SOL', top: 90, needsLedger: false }, { name: 'LA', top: 75, needsLedger: false },
        { name: 'SI', top: 60, needsLedger: false }, { name: 'DO', top: 45, needsLedger: false },
        { name: 'RE', top: 30, needsLedger: false }, { name: 'MI', top: 15, needsLedger: false },
        { name: 'FA', top: 0, needsLedger: false }, { name: 'SOL', top: -15, needsLedger: false }
    ];

    let state = { score: 0, streak: 0, correctAnswers: 0, currentNote: null, isLocked: false };

    function initGame() {
        const notas = ['DO', 'RE', 'MI', 'FA', 'SOL', 'LA', 'SI'];
        const container = document.getElementById('btn-container');
        container.innerHTML = '';
        notas.forEach(n => {
            const b = document.createElement('button');
            b.className = 'btn-note'; b.textContent = n; b.dataset.note = n;
            b.onclick = () => handleGuess(n, b);
            container.appendChild(b);
        });
        generateNextNote();
    }

    function generateNextNote() {
        state.currentNote = MUSIC_DATA[Math.floor(Math.random() * MUSIC_DATA.length)];
        document.getElementById('active-note').style.top = `${state.currentNote.top}px`;
        document.getElementById('ledger-line').style.display = state.currentNote.needsLedger ? 'block' : 'none';
        state.isLocked = false;
        resetBtns();
    }

    function handleGuess(guess, btn) {
        if (state.isLocked) return;
        state.isLocked = true;
        const correct = guess === state.currentNote.name;

        if (correct) {
            state.score += 10; state.streak++; state.correctAnswers++;
            btn.classList.add('correct');
            showFeedback(true);
        } else {
            state.streak = 0;
            btn.classList.add('incorrect');
            showFeedback(false);
        }

        document.getElementById('score').textContent = state.score;
        document.getElementById('streak').textContent = state.streak;
        document.getElementById('correct-count').textContent = state.correctAnswers % 20;

        setTimeout(() => {
            if (correct && state.correctAnswers > 0 && state.correctAnswers % 20 === 0) {
                launchMiniGame();
            } else {
                generateNextNote();
            }
        }, 1200);
    }

    function showFeedback(ok) {
        const f = document.getElementById('feedback');
        f.textContent = ok ? "¡Excelente! 🌟" : `Era ${state.currentNote.name} 🍄`;
        f.className = `feedback-msg ${ok ? 'msg-success' : 'msg-error'}`;
        f.style.opacity = 1;
        setTimeout(() => f.style.opacity = 0, 1000);
    }

    function resetBtns() {
        document.querySelectorAll('.btn-note').forEach(b => b.classList.remove('correct', 'incorrect'));
    }

    // --- MINIJUEGOS ---
    function launchMiniGame() {
        const modal = document.getElementById('minigame-modal');
        const container = document.getElementById('mg-container');
        modal.style.display = 'flex';
        
        container.innerHTML = `
            <h2>🎁 ¡SORPRESA!</h2>
            <p>Elige un cofre para ganar puntos extra:</p>
            <button class="mg-btn" onclick="endMG(50)">📦</button>
            <button class="mg-btn" onclick="endMG(100)">📦</button>
            <button class="mg-btn" onclick="endMG(20)">📦</button>
        `;
    }

    window.endMG = (pts) => {
        state.score += pts;
        document.getElementById('score').textContent = state.score;
        document.getElementById('minigame-modal').style.display = 'none';
        generateNextNote();
    };
</script>

</body>
</html>
