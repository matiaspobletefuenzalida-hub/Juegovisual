<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Pentagrama - Misión Clave de Sol</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fff9c4; 
            --surface: #ffffff;
            --text-main: #2c3e50;
            --primary: #2c3e50;
            --accent: #049CD8;   /* Azul Mario */
            --accent-hover: #0082c3;
            --success: #43B047;  /* Verde Mario */
            --error: #E52521;    /* Rojo Mario */
            --guide: #FF9800;    /* Naranja Guía */
            --staff-lines: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#fff176 15%, transparent 15%);
            background-size: 30px 30px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 0px #fbc02d, 0 25px 40px rgba(0,0,0,0.1);
            border: 5px solid #fff;
            border-bottom: 12px solid #ffb300;
            border-bottom-right-radius: 60px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            position: relative;
        }

        /* --- TÍTULO ESTILO SUPER MARIO --- */
        h1.mario-title { 
            font-family: 'Fredoka', sans-serif; 
            font-weight: 900; 
            font-size: 4.2rem; 
            margin-bottom: 0.5rem; 
            letter-spacing: 2px;
            line-height: 1.1;
            text-shadow: 
                -4px -4px 0 #000,  
                 4px -4px 0 #000,
                -4px  4px 0 #000,
                 4px  4px 0 #000,
                 0px  6px 0 #000,
                 0px 15px 10px rgba(0,0,0,0.3);
        }

        .mario-title span { display: inline-block; }
        .mario-title span:nth-child(even) { transform: rotate(3deg) translateY(-3px); }
        .mario-title span:nth-child(odd) { transform: rotate(-3deg) translateY(3px); }

        .m-red { color: #E52521; }
        .m-blue { color: #049CD8; }
        .m-yellow { color: #FBD000; }
        .m-green { color: #43B047; }

        p.subtitle { 
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            color: #546e7a; 
            margin-top: 10px;
            margin-bottom: 2.5rem; 
            font-size: 1.3rem; 
        }

        /* --- PANTALLA DE INICIO / LOGIN --- */
        .start-screen {
            background: #f8f9fa;
            border: 4px dashed #049CD8;
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .start-screen h2 {
            font-family: 'Fredoka', sans-serif;
            color: var(--text-main);
            margin-bottom: 15px;
        }

        .start-screen input {
            font-family: 'Nunito', sans-serif;
            font-size: 1.2rem;
            padding: 10px 15px;
            width: 80%;
            max-width: 300px;
            border: 3px solid #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
        }

        .start-screen input:focus { border-color: var(--accent); }

        .btn-start {
            font-family: 'Fredoka', sans-serif;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: 700;
            background-color: var(--success); 
            color: white;
            border: 3px solid #000; 
            border-radius: 50px; 
            cursor: pointer;
            position: relative;
            top: 0;
            transition: all 0.1s;
            text-shadow: 1px 1px 0 #000;
            box-shadow: 0 6px 0px #000;
        }

        .btn-start:active:not(:disabled) { top: 6px; box-shadow: 0 0px 0px #000; }
        .btn-start:disabled { background-color: #aaa; cursor: not-allowed; }

        /* --- MOTOR GRÁFICO DEL PENTAGRAMA --- */
        .staff-container {
            position: relative;
            width: 100%;
            height: 200px;
            background: transparent;
            margin: 0 auto 3rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staff-lines {
            position: relative;
            width: 80%;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .line {
            width: 100%;
            height: 3px; 
            background-color: var(--staff-lines);
            position: relative;
            z-index: 1;
        }

        .clef {
            position: absolute;
            font-family: 'Noto Music', sans-serif;
            font-size: 110px; /* Tamaño reducido para no superponerse */
            left: 10px;
            top: 50%;
            transform: translateY(-50%); /* Centrado ajustado al nuevo tamaño */
            color: var(--staff-lines);
            z-index: 2;
            user-select: none;
        }

        .note {
            position: absolute;
            left: 220px;
            width: 28px; 
            height: 22px;
            background-color: #000;
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            z-index: 3;
            transition: top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.2s ease-out;
            border: 2px solid #000;
        }

        .note.pop { transform: translate(-50%, -50%) rotate(-15deg) scale(1.6); }

        .ledger-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(15deg);
            width: 44px;
            height: 3px;
            background-color: var(--staff-lines);
            display: none;
            z-index: -1;
        }

        /* --- UI DE CONTROLES --- */
        .controls {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-bottom: 1.5rem;
            padding: 0 10px;
        }

        .tools {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        @media (max-width: 600px) {
            .controls { grid-template-columns: repeat(4, 1fr); }
            .note { left: 160px; }
            .staff-lines { width: 95%; }
            h1.mario-title { font-size: 3rem; }
        }

        .btn-note, .btn-tool {
            font-family: 'Fredoka', sans-serif;
            padding: 18px 10px;
            font-size: 1.4rem;
            font-weight: 700;
            background-color: var(--accent); 
            color: white;
            border: 3px solid #000; 
            border-radius: 50px; 
            cursor: pointer;
            position: relative;
            top: 0;
            transition: all 0.1s;
            text-shadow: 1px 1px 0 #000;
            box-shadow: 0 6px 0px #000;
        }

        .btn-tool { background-color: var(--guide); padding: 12px 25px; font-size: 1.2rem; }
        .btn-note:hover:not(:disabled), .btn-tool:hover:not(:disabled) { filter: brightness(1.1); }
        .btn-note:active:not(:disabled), .btn-tool:active:not(:disabled) { top: 6px; box-shadow: 0 0px 0px #000; }
        .btn-note:disabled, .btn-tool:disabled { cursor: not-allowed; opacity: 0.8; }
        
        .btn-note.correct { background-color: var(--success); border-color: #000; color: white; }
        .btn-note.incorrect { background-color: var(--error); border-color: #000; color: white; animation: shake 0.4s; }

        /* --- FEEDBACK Y PUNTAJE --- */
        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 1rem;
        }

        #score, #streak { color: var(--accent); }

        .feedback-msg {
            height: 35px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 1rem;
            transition: opacity 0.3s;
            opacity: 0;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
        }

        .msg-success { color: var(--success); }
        .msg-error { color: var(--error); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* --- MODAL DE VENTANA EMERGENTE (GUÍA) --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: #fff;
            padding: 2rem;
            border-radius: 24px;
            border: 6px solid var(--guide);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            position: relative;
            width: 95%;
            max-width: 800px;
            text-align: center;
            animation: popModal 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popModal {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 2rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            color: #aaa;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover { color: var(--error); }

        .guide-staff-wrapper {
            margin: 1.5rem auto;
            position: relative;
            height: 200px; /* Altura ajustada para no cortar el texto del DO */
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdfaf6;
            border-radius: 15px;
            border: 3px dashed #ccc;
            overflow: hidden; /* Elimina la barra de desplazamiento */
        }

        .g-note {
            position: absolute;
            width: 24px;
            height: 18px;
            background-color: #000;
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
        }

        .g-note-name {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) rotate(15deg);
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 14px;
            color: var(--accent);
        }

        .credito-profesor {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: #546e7a;
            padding-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1 class="mario-title">
        <span class="m-red">S</span><span class="m-blue">U</span><span class="m-yellow">P</span><span class="m-green">E</span><span class="m-red">R</span><br>
        <span class="m-green">P</span><span class="m-blue">E</span><span class="m-yellow">N</span><span class="m-red">T</span><span class="m-green">A</span><span class="m-blue">G</span><span class="m-red">R</span><span class="m-yellow">A</span><span class="m-green">M</span><span class="m-blue">A</span>
    </h1>
    <p class="subtitle">🍄 ¡Misión: Identifica la nota en Clave de Sol! ⭐</p>

    <div id="start-screen" class="start-screen">
        <h2>Ingresa tu nombre para jugar</h2>
        <input type="text" id="player-name" placeholder="Tu nombre y apellido..." required autocomplete="off">
        <br>
        <button id="btn-start" class="btn-start">▶ JUGAR ◀</button>
    </div>

    <div id="game-area" style="display: none;">
        <div class="staff-container">
            <div class="staff-lines" id="staff">
                <div class="clef">&#x1D11E;</div>
                <div class="line"></div> <div class="line"></div> <div class="line"></div> <div class="line"></div> <div class="line"></div> 
                <div class="note" id="active-note">
                    <div class="ledger-line" id="ledger-line"></div>
                </div>
            </div>
        </div>

        <div class="feedback-msg" id="feedback">¡Bien hecho!</div>

        <div class="controls" id="btn-container"></div>
        
        <div class="tools">
            <button id="btn-guide" class="btn-tool" onclick="openGuideModal()">📖 Pentagrama Guía</button>
        </div>

        <div class="stats">
            <div>💰 Puntuación: <span id="score">0</span></div>
            <div>🔥 Racha: <span id="streak">0</span></div>
        </div>
    </div>

    <div class="credito-profesor">
        Creado por Profesor Matías Poblete
    </div>
</div>

<div id="guide-modal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closeGuideModal()">✖</span>
        <h2 style="font-family: 'Fredoka'; color: var(--guide); font-size: 2.2rem; margin-bottom: 5px;">Mapa de Notas</h2>
        <p style="font-size: 1.1rem; color: #555; margin-bottom: 10px;">Estudia bien la ubicación de cada nota antes de continuar.</p>
        
        <div class="guide-staff-wrapper">
            <div class="staff-lines" style="width: 95%; transform: scale(0.8); transform-origin: center;">
                <div class="clef">&#x1D11E;</div>
                <div class="line"></div> <div class="line"></div> <div class="line"></div> <div class="line"></div> <div class="line"></div> 
                
                <div class="g-note" style="left: 14%; top: 150px;"><div class="ledger-line" style="display:block;"></div><div class="g-note-name">DO</div></div>
                <div class="g-note" style="left: 21%; top: 135px;"><div class="g-note-name">RE</div></div>
                <div class="g-note" style="left: 28%; top: 120px;"><div class="g-note-name">MI</div></div>
                <div class="g-note" style="left: 35%; top: 105px;"><div class="g-note-name">FA</div></div>
                <div class="g-note" style="left: 42%; top: 90px;"><div class="g-note-name">SOL</div></div>
                <div class="g-note" style="left: 49%; top: 75px;"><div class="g-note-name">LA</div></div>
                <div class="g-note" style="left: 56%; top: 60px;"><div class="g-note-name">SI</div></div>
                <div class="g-note" style="left: 63%; top: 45px;"><div class="g-note-name">DO</div></div>
                <div class="g-note" style="left: 70%; top: 30px;"><div class="g-note-name">RE</div></div>
                <div class="g-note" style="left: 77%; top: 15px;"><div class="g-note-name">MI</div></div>
                <div class="g-note" style="left: 84%; top: 0px;"><div class="g-note-name">FA</div></div>
                <div class="g-note" style="left: 91%; top: -15px;"><div class="g-note-name">SOL</div></div>
            </div>
        </div>
        
        <button class="btn-start" onclick="closeGuideModal()" style="font-size: 1.2rem; padding: 12px 25px; background-color: var(--success);">¡Listo, a jugar!</button>
    </div>
</div>

<script>
    // --- LÓGICA DE FORMSUBMIT ---
    const startScreen = document.getElementById('start-screen');
    const gameArea = document.getElementById('game-area');
    const btnStart = document.getElementById('btn-start');
    const playerNameInput = document.getElementById('player-name');

    btnStart.addEventListener('click', () => {
        const playerName = playerNameInput.value.trim();
        
        if (!playerName) {
            alert("¡Por favor, escribe tu nombre para comenzar la misión!");
            return;
        }

        btnStart.textContent = "Preparando nivel...";
        btnStart.disabled = true;

        fetch("https://formsubmit.co/ajax/matias.poblete@slepcolchagua.cl", {
            method: "POST",
            headers: { 
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({
                _subject: `Nuevo Jugador: ${playerName}`,
                Mensaje: `¡El alumno ${playerName} acaba de entrar a jugar Super Pentagrama!`,
                NombreDelJugador: playerName
            })
        })
        .then(response => response.json())
        .then(data => {
            startScreen.style.display = 'none';
            gameArea.style.display = 'block';
            initGame();
        })
        .catch(error => {
            console.error("Error al enviar el correo", error);
            startScreen.style.display = 'none';
            gameArea.style.display = 'block';
            initGame();
        });
    });


    // --- LÓGICA DEL JUEGO ---
    const MUSIC_DATA = [
        { name: 'DO', top: 150, needsLedger: true },  
        { name: 'RE', top: 135, needsLedger: false }, 
        { name: 'MI', top: 120, needsLedger: false }, 
        { name: 'FA', top: 105, needsLedger: false }, 
        { name: 'SOL', top: 90, needsLedger: false }, 
        { name: 'LA', top: 75, needsLedger: false },  
        { name: 'SI', top: 60, needsLedger: false },  
        { name: 'DO', top: 45, needsLedger: false },  
        { name: 'RE', top: 30, needsLedger: false },  
        { name: 'MI', top: 15, needsLedger: false },  
        { name: 'FA', top: 0, needsLedger: false },   
        { name: 'SOL', top: -15, needsLedger: false } 
    ];

    const UI = {
        noteEl: document.getElementById('active-note'),
        ledgerEl: document.getElementById('ledger-line'),
        btnContainer: document.getElementById('btn-container'),
        feedback: document.getElementById('feedback'),
        score: document.getElementById('score'),
        streak: document.getElementById('streak'),
        btnGuide: document.getElementById('btn-guide'),
        modal: document.getElementById('guide-modal')
    };

    let state = {
        currentNote: null,
        score: 0,
        streak: 0,
        isLocked: false,
        noteCount: 0,
        focusNotes: []
    };

    function initGame() {
        const notasUnicas = ['DO', 'RE', 'MI', 'FA', 'SOL', 'LA', 'SI'];
        
        UI.btnContainer.innerHTML = ''; 
        notasUnicas.forEach(nota => {
            const btn = document.createElement('button');
            btn.className = 'btn-note';
            btn.textContent = nota;
            btn.dataset.note = nota;
            btn.onclick = () => handleGuess(nota, btn);
            UI.btnContainer.appendChild(btn);
        });

        generateNextNote();
    }

    function updateFocusNotes() {
        let shuffled = [...MUSIC_DATA].sort(() => 0.5 - Math.random());
        state.focusNotes = shuffled.slice(0, 2);
    }

    function generateNextNote() {
        if (state.noteCount % 10 === 0) {
            updateFocusNotes();
        }
        state.noteCount++;

        let nextNote;
        let rand = Math.random();

        if (state.currentNote && rand < 0.30) {
            nextNote = state.currentNote;
        } else if (rand < 0.70 && state.focusNotes.length > 0) {
            nextNote = state.focusNotes[Math.floor(Math.random() * state.focusNotes.length)];
        } else {
            nextNote = MUSIC_DATA[Math.floor(Math.random() * MUSIC_DATA.length)];
        }

        if (state.currentNote && nextNote.top === state.currentNote.top) {
            UI.noteEl.classList.add('pop');
            setTimeout(() => UI.noteEl.classList.remove('pop'), 200);
        }

        state.currentNote = nextNote;

        UI.noteEl.style.top = `${nextNote.top}px`;
        UI.ledgerEl.style.display = nextNote.needsLedger ? 'block' : 'none';
        
        state.isLocked = false;
        resetButtons();
    }

    function handleGuess(guessName, btnElement) {
        if (state.isLocked) return;
        state.isLocked = true; 

        const isCorrect = (guessName === state.currentNote.name);

        if (isCorrect) {
            state.score += 10;
            state.streak += 1;
            btnElement.classList.add('correct');
            showFeedback(true);
        } else {
            state.streak = 0;
            btnElement.classList.add('incorrect');
            
            const correctBtn = document.querySelector(`button[data-note="${state.currentNote.name}"]`);
            if (correctBtn) correctBtn.classList.add('correct');
            
            showFeedback(false);
        }

        UI.score.textContent = state.score;
        UI.streak.textContent = state.streak;

        setTimeout(() => {
            UI.feedback.style.opacity = '0';
            generateNextNote();
        }, 1500);
    }

    function showFeedback(isSuccess) {
        const msgsSuccess = ["¡Perfecto! ✨", "¡Exacto! ⭐", "¡Muy bien! 🍄", "¡Excelente oído! 🔥"];
        const msgsError = [`¡Casi! Era ${state.currentNote.name} 😢`, `Revisa bien, era ${state.currentNote.name} 🧐`, `¡Atento! Esa nota es ${state.currentNote.name} 🍄`];
        
        const arr = isSuccess ? msgsSuccess : msgsError;
        UI.feedback.textContent = arr[Math.floor(Math.random() * arr.length)];
        
        UI.feedback.className = 'feedback-msg ' + (isSuccess ? 'msg-success' : 'msg-error');
        UI.feedback.style.opacity = '1';
    }

    function resetButtons() {
        const btns = document.querySelectorAll('.btn-note');
        btns.forEach(btn => {
            btn.classList.remove('correct', 'incorrect');
        });
    }

    // --- FUNCIONES DEL MODAL ---
    function openGuideModal() {
        if (state.isLocked) return; 
        UI.modal.style.display = 'flex';
    }

    function closeGuideModal() {
        UI.modal.style.display = 'none';
    }
</script>
</body>
</html>
